<!DOCTYPE html>
<html>
<head>
    <title>CSS Border Properties Demo</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
            text-align: center;
        }

        h1 {
            margin-bottom: 30px;
        }

        .box {
            width: 250px;
            padding: 20px;
            margin: 20px auto;
            background-color: white;
        }

        /* Border style */
        .style-demo {
            border-style: dashed;
            border-width: 4px;
            border-color: blue;
        }

        /* Border width */
        .width-demo {
            border-style: solid;
            border-width: 8px;
            border-color: green;
        }

        /* Border color */
        .color-demo {
            border-style: solid;
            border-width: 5px;
            border-color: red;
        }

        /* Border radius */
        .radius-demo {
            border: 5px solid purple;
            border-radius: 25px;
        }
    </style>
</head>

<body>

    <h1>CSS Border Properties Demonstration</h1>

    <div class="box style-demo">
        Border Style (dashed)
    </div>

    <div class="box width-demo">
        Border Width (8px)
    </div>

    <div class="box color-demo">
        Border Color (red)
    </div>

    <div class="box radius-demo">
        Border Radius (rounded corners)
    </div>

</body>
</html>
