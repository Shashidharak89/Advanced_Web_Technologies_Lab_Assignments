<!DOCTYPE html>
<html>
<head>
    <title>Font and Text Properties Demo</title>

    <style>
        body {
            font-family: Arial, sans-serif;   /* font-family */
            background-color: #f2f2f2;
        }

        h1 {
            text-align: center;              /* text-align */
            color: darkblue;                 /* color */
            font-size: 36px;                 /* font-size */
        }

        .italic-text {
            font-style: italic;              /* font-style */
            font-size: 18px;
        }

        .bold-text {
            font-weight: bold;               /* font-weight */
            color: green;
        }

        .decorated-text {
            text-decoration: underline;      /* text-decoration */
            color: red;
            font-size: 20px;
        }

        .mixed-style {
            font-family: "Courier New", monospace;
            font-size: 22px;
            font-style: italic;
            font-weight: bold;
            color: purple;
            text-align: right;
            text-decoration: line-through;
        }
    </style>
</head>

<body>

    <h1>CSS Font and Text Properties</h1>

    <p class="italic-text">
        This paragraph demonstrates the font-style property (italic).
    </p>

    <p class="bold-text">
        This paragraph demonstrates the font-weight property (bold).
    </p>

    <p class="decorated-text">
        This paragraph demonstrates text-decoration (underline).
    </p>

    <p class="mixed-style">
        This paragraph combines multiple font and text properties.
    </p>

</body>
</html>
