<!DOCTYPE html>
<html>
<head>
    <title>CSS Priority Demo</title>

    <!-- External CSS -->
    <link rel="stylesheet" href="style.css">

    <!-- Internal CSS -->
    <style>
        h1 {
            color: green;
            font-size: 40px;
        }

        p {
            color: purple;
        }
    </style>
</head>
<body>

    <!-- Inline CSS -->
    <h1 style="color: red; font-size: 50px;">
        CSS Priority Example
    </h1>

    <p>This paragraph is styled using internal CSS.</p>

</body>
</html>
