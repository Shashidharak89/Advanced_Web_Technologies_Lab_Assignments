<!DOCTYPE html>
<html>
<head>
    <title>Form Validation</title>
</head>
<body>

<h2>Registration Form</h2>

<form id="form">
    Name: <input type="text" id="name"><span id="nErr"></span><br><br>
    Email: <input type="text" id="email"><span id="eErr"></span><br><br>
    Phone: <input type="text" id="phone"><span id="pErr"></span><br><br>
    Password: <input type="password" id="pass"><span id="passErr"></span><br><br>
    <button type="submit">Submit</button>
</form>

<script src="script.js"></script>
</body>
</html>
