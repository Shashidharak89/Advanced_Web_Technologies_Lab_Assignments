<!DOCTYPE html>
<html>
<head>
    <title>Name Count</title>
</head>
<body>

<h2>Count Names Ending with 'ie' or 'y'</h2>

Enter Names (comma separated): 
<input type="text" id="names">
<button onclick="check()">Check</button>

<h3 id="result"></h3>

<script>
function countNames(arr) {
    let count = 0;

    for (let i = 0; i < arr.length; i++) {
        let name = arr[i].trim().toLowerCase();
        if (name.endsWith("ie") || name.endsWith("y")) {
            count++;
        }
    }
    return count;
}

function check() {
    let input = document.getElementById("names").value;
    let arr = input.split(",");
    let res = countNames(arr);

    document.getElementById("result").innerHTML =
        "Count: " + res;
}
</script>

</body>
</html>
