<!DOCTYPE html>
<html>

<head>
  <title>Move Text</title>
  <style>
    #text {
      position: absolute;
      left: 100px;
      top: 100px;
      font-size: 20px;
    }
  </style>
</head>

<body>

  <p id="text">Welcome to NMAMIT Nitte</p>

  <button onclick="move(-10,0)">Move Left</button>
  <button onclick="move(10,0)">Move Right</button>
  <button onclick="move(0,-10)">Move Up</button>
  <button onclick="move(0,10)">Move Down</button>

  <script>
    let x = 100, y = 100;

    function move(dx, dy) {
      x += dx;
      y += dy;
      let t = document.getElementById("text");
      t.style.left = x + "px";
      t.style.top = y + "px";
    }
  </script>

</body>

</html>
